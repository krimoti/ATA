<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MOTI HarnessPro</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ════════════════════════════════════════════
     TOOLBAR
════════════════════════════════════════════ -->
<div id="toolbar" class="no-print">
  <div style="flex-shrink:0">
    <div class="logo">MOTI</div>
    <div class="logo-sub">HARNESS PRO</div>
  </div>

  <div class="tabs">
    <button class="tab on"        onclick="showTab('canvas',this)">CANVAS</button>
    <button class="tab"           onclick="showTab('drawing',this)">DRAWING</button>
    <button class="tab"           onclick="showTab('routes',this)">ROUTES</button>
    <button class="tab"           onclick="showTab('bom',this)">BOM</button>
    <button class="tab"           onclick="showTab('cutlist',this)">CUT LIST</button>
    <button class="tab t-custom"  onclick="showTab('connectors',this)">&#9741; CONN LIB</button>
    <button class="tab t-harness" onclick="showTab('harness',this)">&#x2609; HARNESS</button>
    <button class="tab t-dwg"     onclick="openDwgModal()">&#x1F4D0; ENG DRAWING</button>
  </div>

  <label class="lbl">LENGTH mm
    <input id="tb-len" class="fi" type="number" value="500" style="width:60px"
           oninput="S.cableLength=+this.value;saveState()"/>
  </label>
  <label class="lbl">TOL &plusmn;
    <input id="tb-tol" class="fi" type="number" value="20" style="width:40px"
           oninput="S.lengthTol=+this.value;saveState()"/>
  </label>
  <label class="lbl">TITLE
    <input id="tb-title" class="fi" value="CABLE ASS'Y" style="width:100px"
           oninput="S.title=this.value;saveState()"/>
  </label>
  <label class="lbl">DWG#
    <input id="tb-dwg" class="fi" value="DWG-001" style="width:75px"
           oninput="S.dwgNo=this.value;saveState()"/>
  </label>
  <label class="lbl">P/N
    <input id="tb-pn" class="fi" value="PN-00001" style="width:90px"
           oninput="S.partNo=this.value;saveState()"/>
  </label>
  <label class="lbl">REV
    <input id="tb-rev" class="fi" value="A" style="width:28px"
           oninput="S.rev=this.value;saveState()"/>
  </label>
  <label class="lbl">COMPANY
    <input id="tb-co" class="fi" value="" style="width:80px"
           oninput="S.company=this.value;saveState()"/>
  </label>
  <label class="lbl">DRAWN
    <input id="tb-drawn" class="fi" value="" style="width:52px"
           oninput="S.drawnBy=this.value;saveState()"/>
  </label>

  <select id="th-sel" class="fi" style="width:56px" onchange="setTheme(this.value)">
    <option value="">DARK</option>
    <option value="light">LIGHT</option>
    <option value="blue">BLUE</option>
  </select>

  <button class="btn" onclick="exportJSON()">&#x2913; JSON</button>
  <button class="btn" onclick="document.getElementById('imp-file').click()">&#x2912; IMPORT</button>
  <input id="imp-file" type="file" accept=".json" style="display:none" onchange="importJSON(this)"/>
  <button class="btn" onclick="saveHTML()">&#x1F4BE; SAVE</button>
</div>

<!-- ════════════════════════════════════════════
     MAIN LAYOUT
════════════════════════════════════════════ -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-inner"></div>
  </div>

  <!-- Content area -->
  <div id="content">

    <!-- ── CANVAS ── -->
    <div id="panel-canvas" class="panel on" style="overflow:hidden">
      <div id="canvas-toolbar" class="no-print">
        <button id="tool-select"    class="ctool on" onclick="setTool('select')">&#9654; SELECT</button>
        <button id="tool-wire"      class="ctool"    onclick="setTool('wire')" title="Manual wire: click pin &#8594; pin">&#9135; WIRE</button>
        <button id="tool-autoroute" class="ctool"    onclick="setTool('autoroute')" title="Auto-route: click pin &#8594; pin">&#9889; ROUTE</button>
        <button id="tool-dimension" class="ctool"    onclick="setTool('dimension')" title="Add dimension line">&#10231; DIM</button>
        <button id="tool-pan"       class="ctool"    onclick="setTool('pan')" title="Pan view">&#9771; PAN</button>
        <button class="ctool" onclick="fitView()" title="Fit all">&#9635; FIT</button>
        <button class="ctool" onclick="S.zoom=1;renderCanvas()" title="Reset zoom">1:1</button>
        <button class="ctool" onclick="autoRouteAll()"
                style="border-color:#1a3050;color:var(--accent3)"
                title="Auto-route all pins between first two connectors">&#9889;&#9889; ALL</button>
        <select id="route-style" class="fi" style="width:68px;font-size:8px;padding:2px 3px"
                title="Wire routing style">
          <option value="ortho">ORTHO</option>
          <option value="curve">CURVE</option>
          <option value="direct">DIRECT</option>
        </select>
        <span id="route-hint" style="color:var(--text3);font-size:8px;margin-left:4px">
          Drag from sidebar &nbsp;|&nbsp; Right-click=delete &nbsp;|&nbsp; Scroll=zoom &nbsp;|&nbsp; Alt+drag=pan
        </span>
        <button class="ctool" style="margin-left:auto"
                onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
          &#9776; LIB
        </button>
      </div>
      <div id="canvas-wrap"><canvas id="main-canvas"></canvas></div>
      <div id="props">
        <div style="font-size:9px;color:var(--text3);padding:4px">
          Select an element to edit properties
        </div>
      </div>
    </div>

    <!-- ── DRAWING ── -->
    <div id="panel-drawing" class="panel"></div>

    <!-- ── ROUTES ── -->
    <div id="panel-routes" class="panel"></div>

    <!-- ── BOM ── -->
    <div id="panel-bom" class="panel"></div>

    <!-- ── CUT LIST ── -->
    <div id="panel-cutlist" class="panel"></div>

    <!-- ── CONN LIB (CCE) ── -->
    <div id="panel-connectors" class="panel no-print"></div>

    <!-- ── HARNESS VIEW ── -->
    <div id="panel-harness" class="panel">
      <div id="hv-bar" class="no-print">
        <span style="color:var(--accent);font-size:9px;font-weight:bold;letter-spacing:2px">&#x2609; HARNESS VIEW</span>
        <button class="htool" onclick="hvFit()">&#9635; FIT</button>
        <button class="htool" onclick="hvAutoLayout();hvFit()">&#9711; AUTO LAYOUT</button>
        <button class="htool" onclick="hvAddJunction()"
                style="border-color:#1a3050;color:var(--accent3)">&#10022; JUNCTION</button>
        <button class="htool" onclick="hvSync()"
                style="border-color:#1a3010;color:var(--accent2)">&#8635; SYNC</button>
        <span style="flex:1"></span>
        <button onclick="openDwgModal()"
                style="background:var(--accent);border:1px solid #907020;color:#000;
                       font-weight:bold;padding:4px 14px;cursor:pointer;
                       font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px">
          &#x1F4D0; ENGINEERING DRAWING
        </button>
        <span style="color:#504828;font-size:8px">
          Drag=move &nbsp;|&nbsp; Alt+drag=pan &nbsp;|&nbsp; Scroll=zoom &nbsp;|&nbsp;
          Click cable=edit &nbsp;|&nbsp; Dbl-click cable=bend point
        </span>
      </div>
      <div id="hv-wrap"><canvas id="hv-cv"></canvas></div>
      <div id="hv-props">Click a cable segment or connector to edit</div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- ════════════════════════════════════════════
     ENGINEERING DRAWING MODAL
════════════════════════════════════════════ -->
<div id="dwg-modal">
  <div id="dwg-shell">

    <div id="dwg-topbar" style="flex-wrap:wrap;gap:5px"></div>

    <div id="dwg-scroll">
      <div id="dwg-paper"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- ════════════════════════════════════════════
     SCRIPTS — load order matters
════════════════════════════════════════════ -->
<script src="db/connectors.js"></script>
<script src="db/accessories.js"></script>
<script src="js/app.js"></script>
<script src="js/canvas.js"></script>
<script src="js/connlib.js"></script>
<script src="js/panels.js"></script>
<script src="js/harness.js"></script>
<script src="js/drawing.js"></script>

</body>
</html>
